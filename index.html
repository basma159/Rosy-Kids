<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosy Kids || Home Page</title>
    <link rel="shortcut icon" href="images/logo-removebg-preview.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/all.css">
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class=" bg-[linear-gradient(to_left,rgb(214,210,210),rgb(241,228,243),rgb(244,187,270))] mb-10">

    <header
        class="flex justify-between items-center w-full h-28 px-10 shadow-lg shadow-black/20
    bg-[linear-gradient(to_left,rgb(214,210,210),rgb(241,228,243),rgb(244,187,211))] fixed top-0 left-0 z-50 backdrop-blur-sm">
        <div class="logo flex justify-center items-center gap-0">
            <a href="index.html"><img src="images/logo-removebg-preview.png" class="w-32 h-32 object-contain"
                    alt=""></a>
            <a href="index.html">
                <h2 class="text-white font-bold text-xl">Rosy Kids</h2>
            </a>

        </div>
        <div class="buttons flex justify-center items-center gap-3">

            <a href="login.html"
                class="px-3 py-2 rounded-lg  ring-1 text-pink-400 ring-pink-400 hover:bg-pink-400 hover:text-white transition-all duration-300">Login</a>

            <a href="register.html"
                class="px-3 py-2 rounded-lg  ring-1 text-pink-400 ring-pink-400 hover:bg-pink-400 hover:text-white transition-all duration-300">Register</a>
        </div>
        <div class="infoAccount hidden gap-3 justify-center items-center">
            <ul class="flex gap-1 text-gray-700">
                <li>Hello,</li>
                <li class="nameAccount"></li>
            </ul>
            <div class="flex gap-1 text-[#fff] cursor-pointer">
                <p class="shoppingCart  hover:text-pink-400"><i class="fa-solid fa-cart-plus"></i>
                    <span class="badge  hover:text-pink-400"></span>
                </p>
                <div class="relative">
                    <div
                        class="viewAllProducts w-72 max-h-96 text-pink-400 absolute hidden top-10 -translate-x-1/2 bg-white rounded-lg px-2
                 flex-col justify-evenly items-center gap-4 py-4 transition-all duration-300 overflow-y-auto scroll-smooth">
                    </div>
                </div>

            </div>
            <ul class="flex gap-1">
                <button
                    class="LogOut flex gap-1 justify-center items-center px-3 py-2 rounded-lg text-pink-400 ring-1 ring-pink-400 hover:bg-pink-400 hover:text-white transition-all duration-300">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>LogOut</button>
            </ul>

        </div>


    </header>

    <section class="w-full flex justify-center items-center mt-40">
        <div class="container w-[83%] pb-4 py-5 flex flex-col justify-center items-center gap-10 overflow-hidden ">
            <div
                class="search-list w-full px-1 flex gap-5 flex-col md:flex-row justify-evenly items-center overflow-hidden ">
                <div class="select-search relative  bg-white pr-5 rounded-lg">
                    <select
                        class="searchSelect py-4 px-8 text-gray-500 appearance-auto rounded-lg cursor-pointer border-0 outline-none "
                        id="">
                        <option value="productName" selected>Search By Product Name</option>
                        <option value="Price">Search By Price</option>
                        <option value="Color">Search By Color</option>
                    </select>
                    <!-- <i class="fa-solid fa-caret-down absolute top-1/2 right-3 -translate-y-1/2 cursor-pointer"></i> -->
                </div>
                <div class="md:w-1/3 md:flex-1 relative">

                    <input type="search" placeholder="Search..."
                        class="searchBar p-3 pl-10 outline-1 rounded-lg w-full focus:outline-pink-400">
                    <i class="fa-solid fa-magnifying-glass absolute top-1/2 left-4 -translate-y-1/2 text-gray-500"></i>
                </div>

                <button onclick=" search()"
                    class="searchBtn text-white font-bold ring-2 ring-pink-400 bg-pink-400 hover:ring-pink-300 p-3 rounded-lg w-1/2 md:w-36">Search</button>
            </div>
            <div class="allProduct w-full flex justify-center items-center">
                <div
                    class="allProducts w-full px-1 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8 justify-items-center">

                </div>
            </div>
        </div>
    </section>


    <script src="js/script.js"></script>
</body>

</html>
