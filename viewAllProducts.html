<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosy Kids | Your Cart</title>
    <link rel="shortcut icon" href="images/logo-removebg-preview.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/all.css">
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class=" bg-[linear-gradient(to_left,rgb(214,210,210),rgb(241,228,243),rgb(244,187,270))] mb-10">

    <header
        class="flex justify-between items-center w-full h-28 px-10 shadow-lg shadow-black/20
    bg-[linear-gradient(to_left,rgb(214,210,210),rgb(241,228,243),rgb(244,187,211))] fixed top-0 left-0 z-50 backdrop-blur-sm">
        <div class="logo flex justify-center items-center gap-0">
            <a href="index.html"><img src="images/logo-removebg-preview.png" class="w-20 h-20 md:w-32 md:h-32 object-contain"
                    alt=""></a>
            <a href="index.html">
                <h2 class="text-white font-bold text-base md:text-xl">Rosy Kids</h2>
            </a>

        </div>
        <div class="buttons flex justify-center items-center gap-3">
            <button
                class="px-3 py-2 rounded-lg  ring-1 text-pink-400 ring-pink-400 hover:bg-pink-400 hover:text-white transition-all duration-300">
                <a href="login.html">Login</a></button>
            <button
                class="px-3 py-2 rounded-lg  ring-1 text-pink-400  ring-pink-400 hover:bg-pink-400 hover:text-white transition-all duration-300">
                <a href="register.html">Register</a></button>
        </div>
        <div class="infoAccount hidden gap-3 justify-center items-center">
            <ul class="flex gap-1 text-gray-700 text-sm md:text-xl">
                <li>Hello,</li>
                <li class="nameAccount"></li>
            </ul>
            <div class="flex gap-1 text-[#fff] cursor-pointer">
                <p class="shoppingCart  hover:text-pink-400"><i class="fa-solid fa-cart-plus"></i>
                    <span class="badge  hover:text-pink-400"></span>
                </p>
               <div class="relative">
                    <div
                        class="viewAllProducts w-72 max-h-96 text-pink-400 absolute hidden top-10 -translate-x-1/2 bg-white rounded-lg px-2
                 flex-col justify-evenly items-center gap-4 py-4 transition-all duration-300 overflow-y-auto scroll-smooth">
                    </div>
                </div>

            </div>
            <ul class="flex gap-1">
                <button
                    class="LogOut flex gap-1 justify-center items-center px-3 py-2 rounded-lg text-pink-400 ring-1 ring-pink-400 hover:bg-pink-400 hover:text-white transition-all duration-300">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>LogOut</button>
            </ul>

        </div>

    </header>

    <section class="w-full flex justify-center items-center mt-40">
        <div class="container w-full pb-4 py-5 flex flex-col justify-center items-center gap-10 overflow-hidden">
            <div
                class="purchases w-full px-20 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8 justify-items-center">
            </div>
            <p class="showPricing font-bold text-2xl text-pink-950"></p>
            <span class="w-full border-2 border-white"></span>
            <div class="favorite-items flex flex-col gap-10">
                <h2 class="favorite-item1 capitalize flex justify-center items-center text-pink-950 font-bold text-2xl">
                    favorite items</h2>
                <div
                    class="favorite-item2 w-full px-1 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8 justify-items-center">
                    <h3 class="favorite-item3 capitalize text-pink-600 -translate-x-[450px]">You have no favorite items.
                    </h3>
                </div>
            </div>
        </div>
    </section>

    <script src="js/viewAllProducts.js"></script>
</body>

</html>
